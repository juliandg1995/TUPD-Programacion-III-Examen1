<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>

    <header>
        <h1>Food Store</h1>
    </header>

    <main class="auth-container">
        <h2>Crear cuenta</h2>

        <form id="form-registro">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
            </div>
            <div>
                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <p>Ya tenes cuenta? <a href="../login/login.html">Iniciar sesion</a></p>
    </main>

    <script type="module" src="./registro.ts"></script>
</body>

</html>
