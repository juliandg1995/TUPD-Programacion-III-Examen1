<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administracion - Food Store</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>

    <header>
        <h1>Panel de Administracion</h1>
        <nav>
            <ul>
                <li><a href="#" id="btn-logout">Cerrar Sesion</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding: 20px;">
        <h2>Gestion de Productos</h2>

        <table border="1" cellpadding="10" cellspacing="0">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Imagen</th>
                    <th>Nombre</th>
                    <th>Categoria</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-productos"></tbody>
        </table>

        <br>
        <hr>

        <h3>Agregar Producto Rapido</h3>
        <form id="form-producto" action="#" method="POST">
            <label for="nombre">Nombre del Producto:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Lomito Completo"><br><br>

            <label for="precio">Precio:</label><br>
            <input type="number" id="precio" name="precio" min="0"><br><br>

            <label for="categoria">Categoria:</label><br>
            <select id="categoria" name="categoria">
                <option value="">Seleccione una opcion...</option>
                <option value="Hamburguesas">Hamburguesas</option>
                <option value="Pizzas">Pizzas</option>
                <option value="Papas Fritas">Papas Fritas</option>
                <option value="Bebidas">Bebidas</option>
            </select><br><br>

            <label for="descripcion">Descripcion:</label><br>
            <textarea id="descripcion" name="descripcion" rows="4" cols="50"
                placeholder="Ingresa los ingredientes..."></textarea><br><br>

            <button type="submit">Guardar Producto</button>
        </form>
    </main>

    <footer>
        <p>Panel de Administracion - Food Store v2.0</p>
    </footer>

    <script type="module" src="./home.ts"></script>
</body>

</html>
